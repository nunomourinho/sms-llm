# =============================================================================
#  docker-compose.yml — Sistema de alertas SMS (sms_alertas)
#
#  Serviços:
#      sms_alertas — Script Python que lê emails e envia SMS
#      mailserver  — Servidor IMAP+SMTP interno (opcional, profile "mailserver")
#
#  Ligações externas (fora do Docker):
#      → Servidor IMAP externo  (configurado em config.ini [imap])
#      → Yeastar TG100 externo  (configurado em config.ini [tg100])
#
#  Uso — servidor de email externo (padrão):
#      docker compose up -d
#
#  Uso — servidor de email interno:
#      bash setup.sh                            # cria conta de email
#      docker compose --profile mailserver up -d
#      # Aponta config.ini [imap] para 127.0.0.1:143 use_ssl=false
# =============================================================================

services:

  sms_alertas:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APPUSER_UID: ${APPUSER_UID:-1001}
        APPUSER_GID: ${APPUSER_GID:-1001}
    container_name: sms_alertas
    restart: unless-stopped

    volumes:
      # config.ini montado read-only — contém credenciais, não vai para a imagem
      - ./config.ini:/app/config.ini:ro
      # Ficheiro de números de destino
      - ./numeros_sms.txt:/opt/numeros_sms.txt:ro
      # Modelo LLM persistente no host (evita re-download a cada build)
      - ./models:/opt/models
      # Logs persistentes
      - ./logs:/var/log

    # O container executa o script em loop com intervalo configurável em config.ini [schedule] interval
    # (mais leve do que instalar cron dentro do container)
    command: >
      sh -c '
        MODEL=/opt/models/Qwen2.5-1.5B-Instruct-Q4_K_M.gguf &&
        MODEL_URL=https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF/resolve/main/qwen2.5-1.5b-instruct-q4_k_m.gguf &&
        if [ ! -f "$$MODEL" ]; then
          echo "Modelo nao encontrado. A descarregar..." &&
          wget -q --show-progress -O "$$MODEL" "$$MODEL_URL" ||
          { echo "ERRO: Falha ao descarregar o modelo."; exit 1; } ;
        fi &&
        while true; do
          echo "A executar sms_alertas.py..." &&
          python /app/sms_alertas.py || echo "ERRO: Script terminou com erro - a aguardar proxima execucao" ;
          INTERVAL=$$(python3 -c "import configparser; c=configparser.ConfigParser(); c.read(\"/app/config.ini\"); print(c.get(\"schedule\",\"interval\",fallback=\"900\"))") &&
          echo "A aguardar $${INTERVAL}s ate a proxima execucao..." &&
          sleep "$$INTERVAL" ;
        done
      '

    # Acesso à rede do host para alcançar servidores externos
    # (IMAP externo e TG100 na rede local da instituição)
    network_mode: host

    healthcheck:
      test: ["CMD", "python", "-c", "import llama_cpp, requests; print('OK')"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Servidor de email interno (opcional)
  # Ativado com: docker compose --profile mailserver up -d
  #
  # SMTP porta 25  — recebe emails dos sistemas de monitorização externos
  # IMAP porta 143 — lido pelo sms_alertas via 127.0.0.1:143 (sem TLS)
  #
  # Conta criada pelo setup.sh a partir de MAIL_ACCOUNT e MAIL_PASSWORD no .env
  # ---------------------------------------------------------------------------
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:14
    container_name: mailserver
    hostname: mail
    domainname: ${MAIL_DOMAIN:-alertas.local}
    profiles:
      - mailserver
    ports:
      - "25:25"    # SMTP — receber emails externos
      - "143:143"  # IMAP — acesso pelo sms_alertas via localhost
    volumes:
      - maildata:/var/mail
      - mailstate:/var/mail-state
      - maillogs:/var/log/mail
      - ./mailconfig:/tmp/docker-mailserver
    environment:
      TZ: ${TZ:-Europe/Lisbon}
      ENABLE_RSPAMD: "0"
      ENABLE_CLAMAV: "0"
      ENABLE_FAIL2BAN: "0"
      SSL_TYPE: ""
      POSTFIX_INET_PROTOCOLS: ipv4
      PERMIT_DOCKER: connected-networks
      POSTMASTER_ADDRESS: ${MAIL_ACCOUNT:-alertas@alertas.local}
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

volumes:
  maildata:
  mailstate:
  maillogs:
