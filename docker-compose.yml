# =============================================================================
#  docker-compose.yml — Sistema de alertas SMS (sms_alertas)
#
#  Serviços:
#      sms_alertas — Script Python que lê emails e envia SMS
#
#  Ligações externas (fora do Docker):
#      → Servidor IMAP externo  (configurado em config.ini [imap])
#      → Yeastar TG100 externo  (configurado em config.ini [tg100])
#
#  Uso:
#      cp .env.example .env          # preencher credenciais
#      docker compose up -d          # iniciar
#      docker compose logs -f        # ver logs em tempo real
# =============================================================================

services:

  sms_alertas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms_alertas
    restart: unless-stopped

    volumes:
      # config.ini montado read-only — contém credenciais, não vai para a imagem
      - ./config.ini:/app/config.ini:ro
      # Ficheiro de números de destino
      - ./numeros_sms.txt:/opt/numeros_sms.txt:ro
      # Modelo LLM persistente no host (evita re-download a cada build)
      - ./models:/opt/models
      # Logs persistentes
      - ./logs:/var/log

    # O container executa o script em loop com intervalo configurável em config.ini [schedule] interval
    # (mais leve do que instalar cron dentro do container)
    command: >
      sh -c '
        MODEL=/opt/models/Qwen2.5-1.5B-Instruct-Q4_K_M.gguf &&
        MODEL_URL=https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF/resolve/main/qwen2.5-1.5b-instruct-q4_k_m.gguf &&
        if [ ! -f "$$MODEL" ]; then
          echo "Modelo nao encontrado. A descarregar..." &&
          wget -q --show-progress -O "$$MODEL" "$$MODEL_URL" ||
          { echo "ERRO: Falha ao descarregar o modelo."; exit 1; } ;
        fi &&
        while true; do
          echo "A executar sms_alertas.py..." &&
          python /app/sms_alertas.py || echo "ERRO: Script terminou com erro - a aguardar proxima execucao" ;
          INTERVAL=$$(python3 -c "import configparser; c=configparser.ConfigParser(); c.read(\"/app/config.ini\"); print(c.get(\"schedule\",\"interval\",fallback=\"900\"))") &&
          echo "A aguardar $${INTERVAL}s ate a proxima execucao..." &&
          sleep "$$INTERVAL" ;
        done
      '

    # Acesso à rede do host para alcançar servidores externos
    # (IMAP externo e TG100 na rede local da instituição)
    network_mode: host

    healthcheck:
      test: ["CMD", "python", "-c", "import llama_cpp, requests; print('OK')"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
