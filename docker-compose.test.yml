# =============================================================================
#  docker-compose.test.yml — Ambiente de teste semi-real
#
#  IMAP  : imap_server.py (servidor TCP real em Python, email de alerta pré-carregado)
#  LLM   : mock (resposta fixa, sem necessidade do ficheiro GGUF)
#  SMS   : TG100 REAL (credenciais em config.test.ini [tg100])
#
#  Uso:
#      docker compose -f docker-compose.test.yml up --abort-on-container-exit
# =============================================================================

services:

  imap_server:
    image: python:3.12-slim
    container_name: imap_server_test
    volumes:
      - ./test:/test:ro
    command: python /test/imap_server.py
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',1143)); s.close()"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - test_net

  sms_alertas:
    build: .
    container_name: sms_alertas_test
    volumes:
      - ./config.test.ini:/app/config.ini:ro
      - ./numeros_sms.txt:/opt/numeros_sms.txt:ro
      - ./test:/test:ro
      - ./logs:/var/log
    command: python /test/run_test.py
    depends_on:
      imap_server:
        condition: service_healthy
    networks:
      - test_net

networks:
  test_net:
    driver: bridge
