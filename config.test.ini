# =============================================================================
#  config.test.ini — Configuração para testes simulados
#  Usa mailpit (IMAP) e mock_tg100 (HTTP) em vez de serviços reais
# =============================================================================

[imap]
server   = mailpit
port     = 1143
use_ssl  = false
user     = test@domain.com
password = testpass
mailbox  = INBOX

[tg100]
host     = mock_tg100
port     = 8080
use_ssl  = false
user     = testuser
password = testpass123
gsm_port = 1
timeout  = 10

[llm]
# Ficheiro dummy criado em runtime pelo run_test.py
model_path   = /tmp/test.gguf
n_ctx        = 1024
n_threads    = 2
temperature  = 0.1
max_tokens   = 60

[sms]
char_limit          = 140
numeros_ficheiro    = /opt/numeros_sms.txt

[llm_prompt]
system = You extract data from IT monitoring alert emails. Reply ONLY with this exact format, no other text: S: [SystemName] | T: [Subject] | L: [Level] | D: [Details]. Keep the total reply under {char_limit} characters.

[logging]
level   = INFO
logfile =
